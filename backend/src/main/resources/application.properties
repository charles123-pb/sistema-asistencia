# ==============================
# SERVIDOR
# ==============================
server.port=${SERVER_PORT:3001}

# ==============================
# BASE DE DATOS (H2 en memoria - para desarrollo)
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:attendancedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==============================
# BASE DE DATOS (PostgreSQL - para producción)
# Descomentar y configurar cuando estés listo
# ==============================
# spring.datasource.url=jdbc:postgresql://localhost:5432/attendancedb
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=tu_password

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Para PostgreSQL usar:
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=update

# ==============================
# JWT
# ==============================
jwt.secret=${JWT_SECRET:MiClaveSecretaMuyLargaParaJWTQueDebeSerDe256BitsOmas12345678901234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==============================
# CORS - Angular corre en 4200
# ==============================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

# ==============================
# LOGGING
# ==============================
logging.level.com.attendance=DEBUG
logging.level.org.springframework.security=DEBUG
